server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: bitwarden-server
  
  datasource:
    url: jdbc:postgresql://localhost:5432/bitwarden
    username: ${DB_USERNAME:bitwarden}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  mail:
    host: ${MAIL_HOST:smtp.sendgrid.net}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:apikey}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  cache:
    type: simple
    
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:}

logging:
  level:
    com.bitwarden.server: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

bitwarden:
  site-name: Bitwarden
  project-name: Api
  self-hosted: ${SELF_HOSTED:false}
  
  stripe:
    api-key: ${STRIPE_API_KEY:}
    
  sendgrid:
    api-key: ${SENDGRID_API_KEY:}
    
  jwt:
    secret: ${JWT_SECRET:your-secret-key}
    expiration: ${JWT_EXPIRATION:86400}
